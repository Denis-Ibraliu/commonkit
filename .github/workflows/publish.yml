name: Publish

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Preview the publish without uploading to npm
        required: false
        default: false
        type: boolean
      first-release:
        description: Use for the very first npm publish from this repository
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-commonkit-conditional
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun ci

      - name: Build package
        run: bunx nx run '@commonkit/conditional:build'

      - name: Check npm token presence
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_ACCESS_TOKEN secret is missing for environment 'npm'."
            exit 1
          fi

          echo "NPM_ACCESS_TOKEN secret is present."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Verify npm auth
        run: bunx npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Publish package
        run: |
          args=(--projects=@commonkit/conditional --outputStyle=static)

          if [ "${{ inputs.dry-run }}" = "true" ]; then
            args+=(--dry-run)
          fi

          if [ "${{ inputs.first-release }}" = "true" ]; then
            args+=(--first-release)
          fi

          bunx nx release publish "${args[@]}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
